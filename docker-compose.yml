services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: brm
      POSTGRES_PASSWORD: brm
      POSTGRES_DB: brm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro

volumes:
  postgres_data:
